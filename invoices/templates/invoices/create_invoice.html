{% extends 'invoices/base.html' %}

{% block content %}

<div class="card shadow-lg p-4">

    <h2 class="mb-4">
        Create Invoice
    </h2>

    <form method="POST">

        {% csrf_token %}

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Customer
                </label>

                <select name="customer"
                        class="form-control"
                        required>

                    <option value="">
                        Select Customer
                    </option>

                    {% for customer in customers %}

                        <option value="{{ customer.id }}">

                            {% if customer.company_name %}

                                {{ customer.company_name }}

                            {% else %}

                                {{ customer.customer_name }}

                            {% endif %}

                        </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col-md-3 mb-3">

                <label class="form-label">
                    Invoice Date
                </label>

                <input type="date"
                       name="invoice_date"
                       class="form-control"
                       required>

            </div>

            <div class="col-md-3 mb-3">

                <label class="form-label">
                    Due Date
                </label>

                <input type="date"
                       name="due_date"
                       class="form-control">

            </div>

            <div class="col-md-3 mb-3">

                <label class="form-label">
                    Payment Method
                </label>

                <select name="payment_method"
                        class="form-control">

                    <option value="Cash">
                        Cash
                    </option>

                    <option value="Bank">
                        Bank Transfer
                    </option>

                    <option value="UPI">
                        UPI
                    </option>

                    <option value="Online">
                        Online
                    </option>

                </select>

            </div>

        </div>

        <hr>

        <h4 class="mb-3">
            Invoice Items
        </h4>

        <table class="table table-bordered"
               id="invoice-table">

            <thead class="table-dark">

                <tr>

                    <th>Description</th>
                    <th>HSN/SAC</th>
                    <th width="120">Qty</th>
                    <th width="150">Rate</th>
                    <th width="120">GST %</th>
                    <th width="180">Amount</th>
                    <th width="100">Remove</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>

                        <select name="product[]"
                                class="form-control product-select"
                                required>

                            <option value="">
                                Select Product
                            </option>

                            {% for product in products %}

                            <option
                                value="{{ product.id }}"
                                data-name="{{ product.product_name }}"
                                data-hsn="{{ product.hsn_sac }}"
                                data-gst="{{ product.gst_percent }}"
                                data-rate="{{ product.selling_price }}">

                                {{ product.product_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </td>

                    <td>

                       <input type="text"
                            name="hsn[]"
                            class="form-control hsn"
                            readonly>

                    </td>

                    <td>

                        <input type="number"
                            step="0.01"
                            name="quantity[]"
                            class="form-control quantity"
                            required>

                    </td>

                    <td>

                        <input type="number"
                            step="0.01"
                            name="rate[]"
                            class="form-control rate"
                            readonly>

                    </td>

                    <td>

                        <input type="number"
                            step="0.01"
                            name="gst[]"
                            class="form-control gst"
                            readonly>

                    </td>

                    <td>

                        <input type="number"
                            step="0.01"
                            class="form-control amount"
                            readonly>

                    </td>

                    <td>

                        <button type="button"
                                class="btn btn-danger"
                                onclick="removeRow(this)">

                            X

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

        <button type="button"
                class="btn btn-secondary mb-4"
                onclick="addRow()">

            + Add Row

        </button>

        <div class="mb-3">
            <label class="form-label">Note</label>
            {{ form.note }}
        </div>

        <div class="row">

            <div class="col-md-6">

                <div class="card p-3 bg-light">

                    <div class="mb-3">

                        <label>
                            Discount
                        </label>

                        <input type="number"
                               step="0.01"
                               name="discount"
                               id="discount"
                               class="form-control"
                               value="0">

                    </div>

                    <h5>
                        Subtotal:
                        ₹ <span id="subtotal">0.00</span>
                    </h5>

                    <h5>
                        GST:
                        ₹ <span id="gst-total">0.00</span>
                    </h5>

                    <h4 class="mt-3">

                        Grand Total:
                        ₹ <span id="grand-total">0.00</span>

                    </h4>

                </div>

            </div>

        </div>

        <button type="submit"
                class="btn btn-success btn-lg mt-4">

            Save Invoice

        </button>

    </form>

</div>

{% endblock %}
