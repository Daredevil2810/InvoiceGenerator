{% extends 'invoices/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg border-0">

            <div class="card-body p-5">

                <h2 class="text-center mb-4">

                    Login

                </h2>

                {% if messages %}

                    {% for message in messages %}

                        <div class="alert alert-danger">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label>

                            Username
                        </label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>

                            Password
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               required>

                    </div>

                    <button class="btn btn-dark w-100">

                        Login

                    </button>

                </form>

                <div class="text-center mt-3">

                    <a href="/signup/">

                        Create Account

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
