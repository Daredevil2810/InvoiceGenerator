{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Invoice Generator</title>

    <meta charset="UTF-8">
    
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark no-print">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/">Invoice Generator</a>

        <div>

            {% if user.is_authenticated %}

                <a href="/dashboard/"
                class="btn btn-outline-light">
                    Dashboard
                </a>

                <a href="/create-invoice/"
                class="btn btn-success">
                    Create Invoice
                </a>

                <a href="/customers/"
                class="btn btn-primary">
                    Customers
                </a>

                <a href="/products/"
                class="btn btn-warning">
                    Products
                </a>

                <a href="/company-profile/"
                class="btn btn-info">
                    Company Profile
                </a>

                <a href="#"
                class="dropdown-item"
                onclick="openActionModal(
                    '{% url "logout" %}',
                    'Logout',
                    'Are you sure you want to logout?'
                )">

                    Logout

                </a>

            {% else %}

                <a href="/login/"
                class="btn btn-outline-light">
                    Login
                </a>

                <a href="/signup/"
                class="btn btn-success">
                    Sign Up
                </a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<!-- ACTION MODAL -->

<div id="actionModal" class="print-guide-modal">

    <div class="print-guide-content">

        <h4 id="actionModalTitle">
            Confirm Action
        </h4>

        <p id="actionModalMessage">
        </p>

        <div class="print-guide-buttons">

            <a id="actionModalConfirm"
               href="#"
               class="btn btn-danger">

                Continue

            </a>

            <button onclick="closeActionModal()"
                    class="btn btn-secondary">

                Cancel

            </button>

        </div>

    </div>

</div>

<script src="{% static 'js/invoice.js' %}"></script>

</body>
</html>
